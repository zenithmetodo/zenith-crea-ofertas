<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" role="img" aria-label="Zenith Crea Ofertas architecture diagram">
  <defs>
    <linearGradient id="arch-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0B0B17"/>
    </linearGradient>
    <linearGradient id="master-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#B845FF"/>
    </linearGradient>
    <linearGradient id="cluster-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#00B5A0"/>
    </linearGradient>
    <linearGradient id="cluster-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B845FF"/>
      <stop offset="100%" stop-color="#8B2DCC"/>
    </linearGradient>
    <linearGradient id="cluster-haiku" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9EE7FF"/>
      <stop offset="100%" stop-color="#6FBED9"/>
    </linearGradient>
    <filter id="arch-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arch-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00E5CF" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="600" fill="url(#arch-bg)"/>

  <!-- Cuadrícula sutil -->
  <g opacity="0.04" stroke="#00E5CF" stroke-width="1">
