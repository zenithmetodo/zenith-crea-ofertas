    <path d="M640,170 Q640,200 460,240"/>
    <path d="M640,170 L640,240"/>
    <path d="M640,170 Q640,200 820,240"/>
    <path d="M640,170 Q640,200 1080,240"/>
    <path d="M640,170 Q640,330 280,420"/>
