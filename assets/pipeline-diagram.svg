    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#050510" font-weight="700">03</text>
    <text x="14" y="44" font-family="Georgia, serif" font-size="15" fill="#050510" font-weight="700">One Belief</text>
    <text x="14" y="62" font-family="ui-monospace, monospace" font-size="10" fill="#050510" opacity="0.8">4 variantes</text>
  </g>

  <!-- Stage 4 · Identidad -->
  <g transform="translate(640,160)">
    <rect width="170" height="80" rx="12" fill="url(#sonnet-grad)" opacity="0.95" filter="url(#glow)"/>
    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#ffffff" font-weight="700">04</text>
    <text x="14" y="44" font-family="Georgia, serif" font-size="15" fill="#ffffff" font-weight="700">Identidad</text>
    <text x="14" y="62" font-family="ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.85">vs Anti-id.</text>
  </g>

