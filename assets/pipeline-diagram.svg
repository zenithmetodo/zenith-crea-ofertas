<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Zenith Crea Ofertas pipeline diagram">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0B0B17"/>
    </linearGradient>
    <linearGradient id="opus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#00B5A0"/>
    </linearGradient>
    <linearGradient id="sonnet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B845FF"/>
      <stop offset="100%" stop-color="#8B2DCC"/>
    </linearGradient>
    <linearGradient id="haiku-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9EE7FF"/>
      <stop offset="100%" stop-color="#6FBED9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00E5CF" opacity="0.7"/>
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="800" fill="url(#bg-grad)"/>

  <!-- Cuadrícula sutil -->
  <g opacity="0.04" stroke="#00E5CF" stroke-width="1">
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Título -->
  <text x="640" y="50"
        font-family="Georgia, serif"
        font-size="32"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle">Pipeline · 17 Etapas</text>
  <text x="640" y="78"
        font-family="Georgia, serif"
        font-style="italic"
        font-size="16"
        fill="#c5c5d4"
        text-anchor="middle">Del brief crudo a la oferta del 1% · 41 agentes orquestados</text>

  <!-- Leyenda -->
  <g transform="translate(40,110)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#opus-grad)"/>
    <text x="22" y="12" font-family="ui-monospace, monospace" font-size="12" fill="#c5c5d4">opus</text>

    <rect x="80" y="0" width="14" height="14" rx="3" fill="url(#sonnet-grad)"/>
    <text x="102" y="12" font-family="ui-monospace, monospace" font-size="12" fill="#c5c5d4">sonnet</text>

    <rect x="170" y="0" width="14" height="14" rx="3" fill="url(#haiku-grad)"/>
    <text x="192" y="12" font-family="ui-monospace, monospace" font-size="12" fill="#c5c5d4">haiku</text>
  </g>

  <!-- Fila 1 · etapas 1-6 -->
  <!-- Stage 1 · Discovery -->
  <g transform="translate(40,160)">
    <rect width="170" height="80" rx="12" fill="url(#opus-grad)" opacity="0.95" filter="url(#glow)"/>
    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#050510" font-weight="700">01</text>
    <text x="14" y="44" font-family="Georgia, serif" font-size="15" fill="#050510" font-weight="700">Discovery</text>
    <text x="14" y="62" font-family="ui-monospace, monospace" font-size="10" fill="#050510" opacity="0.8">brief.json</text>
  </g>

  <!-- Stage 2 · Punto A→B -->
  <g transform="translate(240,160)">
    <rect width="170" height="80" rx="12" fill="url(#opus-grad)" opacity="0.95" filter="url(#glow)"/>
    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#050510" font-weight="700">02</text>
    <text x="14" y="44" font-family="Georgia, serif" font-size="15" fill="#050510" font-weight="700">Punto A → B</text>
    <text x="14" y="62" font-family="ui-monospace, monospace" font-size="10" fill="#050510" opacity="0.8">transformación</text>
  </g>

  <!-- Stage 3 · One Belief -->
