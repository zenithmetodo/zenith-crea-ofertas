    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" fill="#050510" font-weight="700">06 · 07</text>
    <text x="14" y="44" font-family="Georgia, serif" font-size="15" fill="#050510" font-weight="700">Mecanismo</text>
