<!--
═════════════════════════════════════════════════════════════════════════════
  ZENITH · DESIGN SYSTEM v2.0
═════════════════════════════════════════════════════════════════════════════

  Sistema visual oficial del Método Zenith aplicado a TODOS los templates HTML
  del plugin `zenith-crea-ofertas`.

  COLORES MAESTROS:
    --cian        #00E5CF   (primario · acción · luminosidad)
    --cian-soft   #4DECDB   (hover · accent secondary)
    --purple      #B845FF   (acento · misterio · profundidad)
    --purple-soft #C972FF   (gradiente · hover)
    --purple-deep #6E1FB8   (deep dark variant)
    --dark        #050510   (background base)
    --card        #0B0B17   (cards · panels)
    --card-2      #11111f   (cards elevados)
    --grad        cian → purple (gradiente maestro)

  TIPOGRAFÍAS:
    Fraunces       (display · serif · italics elegantes)
    Inter          (body · sans-serif moderno)
    JetBrains Mono (mono · labels · tags · números)

  USO:
    - Copia el bloque <style> entero a cada template específico
    - Inyecta el favicon SVG montaña + footer Zenith en cada HTML
    - Imprimible a PDF (Cmd+P) + Drive-friendly (estética preservada)

  COPYRIGHT:
    "Hecho con Método Zenith™" en footer de cada HTML
═════════════════════════════════════════════════════════════════════════════
-->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith · Design System v2.0</title>

<!-- ═══════════════════════════════════════════════════════════════ -->

<style>
/* ═══════════════════════════════════════════════════════════════════════ */
/* VARIABLES MAESTRAS ZENITH                                                 */
/* ═══════════════════════════════════════════════════════════════════════ */
:root{
  --cian:#00E5CF;
  --cian-soft:#4DECDB;
  --purple:#B845FF;
  --purple-soft:#C972FF;
  --purple-high:#D9A8FF;
  --purple-deep:#6E1FB8;
  --dark:#050510;
  --card:#0B0B17;
  --card-2:#11111f;
  --line: rgba(255,255,255,.08);
  --line-strong: rgba(255,255,255,.18);
  --text: #ffffff;
  --text-2: rgba(255,255,255,.78);
  --text-3: rgba(255,255,255,.5);
  --success: #10e0a1;
  --danger: #ff4d6d;
  --warning: #f59e0b;
  --grad: linear-gradient(135deg, var(--cian) 0%, var(--purple) 100%);
  --grad-soft: linear-gradient(135deg, rgba(0,229,207,.15) 0%, rgba(184,69,255,.15) 100%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Backgrounds ambient */
.bg-fx {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-fx::before {
  content: ""; position: absolute; inset: -50%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,207,.12), transparent 38%),
    radial-gradient(circle at 80% 80%, rgba(184,69,255,.15), transparent 42%);
  animation: drift 18s ease-in-out infinite alternate;
}
@keyframes drift { to { transform: translate(-3%, 4%) rotate(6deg); } }

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

.container { max-width: 1240px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }
.container-narrow { max-width: 980px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════════════════════════════ */
/* TIPOGRAFÍAS                                                                */
/* ═══════════════════════════════════════════════════════════════════════ */
.display { font-family: 'Fraunces', serif; }
.mono { font-family: 'JetBrains Mono', monospace; }

h1, h2, h3, h4 { color: var(--text); letter-spacing: -0.025em; }
h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(48px, 8vw, 96px); line-height: 0.95; }
h1 em { font-style: italic; font-weight: 500; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(36px, 5.5vw, 60px); line-height: 1.05; }
h2 em { font-style: italic; font-weight: 500; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
h3 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: clamp(20px, 2.4vw, 26px); line-height: 1.2; }
h4 { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 18px; }
p { color: var(--text-2); line-height: 1.65; margin-bottom: 16px; }
strong { color: var(--text); font-weight: 600; }
em { font-style: italic; }
em.cian { color: var(--cian); font-style: normal; font-weight: 600; }
em.purple { color: var(--purple); font-style: normal; font-weight: 600; }
em.grad { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; font-style: italic; font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════════ */
/* HUD · TOP BAR ZENITH                                                       */
/* ═══════════════════════════════════════════════════════════════════════ */
.zenith-hud {
  position: sticky; top: 0; z-index: 100;
  padding: 16px 32px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  background: linear-gradient(180deg, rgba(5,5,16,.92), rgba(5,5,16,.6));
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.zenith-brand { display: flex; align-items: center; gap: 12px; }
.zenith-brand .logo {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: var(--grad);
  border-radius: 8px;
  box-shadow: 0 0 20px rgba(0,229,207,.5);
  position: relative;
  overflow: hidden;
}
.zenith-brand .logo svg { width: 18px; height: 18px; filter: drop-shadow(0 0 4px rgba(0,0,0,.4)); }
.zenith-brand .name {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 600;
  font-size: 20px; letter-spacing: -.01em;
  text-transform: none;
  background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
}
.zenith-brand .name .tm { font-size: 11px; vertical-align: super; opacity: .8; margin-left: 2px; }
.zenith-brand .stage {
  margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--line);
  color: var(--text-3); font-family: 'JetBrains Mono', monospace; font-size: 10px;
}
.zenith-brand .stage .num { color: var(--cian); font-weight: 700; }
.zenith-hud .right {
  display: flex; align-items: center; gap: 14px;
  color: var(--text-3);
}
.zenith-hud .right .live { color: var(--cian); display: inline-flex; align-items: center; gap: 6px; }
.zenith-hud .right .live .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--cian);
  box-shadow: 0 0 8px var(--cian); animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .5; } }

/* ═══════════════════════════════════════════════════════════════════════ */
/* HERO SECTION                                                                */
/* ═══════════════════════════════════════════════════════════════════════ */
.hero {
  min-height: 80vh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 100px 0 80px;
  position: relative;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(0,229,207,.12);
  border: 1px solid rgba(0,229,207,.3);
  color: var(--cian);
  padding: 8px 18px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  width: fit-content; margin-bottom: 28px;
}
.hero-tag::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--cian); box-shadow: 0 0 14px var(--cian);
  animation: pulse 2s infinite;
}
.hero-stage-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 24px;
}
.hero-stage-meta .num { color: var(--cian); font-weight: 700; }
.hero h1 .em-strike {
  text-decoration: line-through; text-decoration-thickness: 4px;
  text-decoration-color: var(--purple); color: var(--text-3); font-style: normal;
}
.hero-lead {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: clamp(20px, 2.4vw, 26px); line-height: 1.45;
  color: var(--text-2); max-width: 760px; margin: 30px 0 50px; font-weight: 400;
}
.hero-lead b {
  font-style: normal; font-weight: 600; color: var(--text);
  background: linear-gradient(180deg, transparent 60%, rgba(0,229,207,.28) 60%);
  padding: 0 3px;
}
.hero-meta-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 24px; padding-top: 36px; border-top: 1px dashed var(--line);
}
.hero-meta-grid .block .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 8px;
}
.hero-meta-grid .block .value {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 24px; color: var(--text);
}
.hero-meta-grid .block .value .arrow { color: var(--cian); }

/* ═══════════════════════════════════════════════════════════════════════ */
/* SECTIONS                                                                    */
/* ═══════════════════════════════════════════════════════════════════════ */
section { padding: 80px 0; position: relative; }
section.alt {
  background: linear-gradient(180deg, transparent 0%, rgba(184,69,255,.04) 50%, transparent 100%);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.section-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--cian); margin-bottom: 16px;
}
.section-title {
  font-family: 'Fraunces', serif; font-weight: 400;
  font-size: clamp(36px, 5.5vw, 64px); line-height: 1.0;
  margin-bottom: 24px; letter-spacing: -.025em;
}
.section-title em { font-style: italic; font-weight: 500; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.section-lead {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: clamp(18px, 2vw, 22px); line-height: 1.5;
  color: var(--text-2); max-width: 720px; margin-bottom: 48px; font-weight: 400;
}
.section-lead b { font-style: normal; font-weight: 600; color: var(--text); }

/* ═══════════════════════════════════════════════════════════════════════ */
/* CARDS                                                                       */
/* ═══════════════════════════════════════════════════════════════════════ */
.card-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.card-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.card-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
@media (max-width: 900px) {
  .card-grid-2, .card-grid-3, .card-grid-4 { grid-template-columns: 1fr; }
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 28px;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: rgba(0,229,207,.3);
  transform: translateY(-4px);
  box-shadow: 0 16px 50px -16px rgba(0,229,207,.25);
}
.card .ic {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--grad-soft);
  border: 1px solid var(--line);
  display: grid; place-items: center; margin-bottom: 18px;
  color: var(--cian);
}
.card .num {
  position: absolute; top: 22px; right: 26px;
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  font-size: 36px; line-height: 1;
  background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
}
.card h3 { margin-bottom: 12px; font-size: 20px; }
.card p { font-size: 15px; line-height: 1.55; color: var(--text-2); margin: 0; }

/* ═══════════════════════════════════════════════════════════════════════ */
/* FORMULA BOX                                                                 */
/* ═══════════════════════════════════════════════════════════════════════ */
.formula-box {
  background: linear-gradient(135deg, rgba(0,229,207,.08), rgba(184,69,255,.08));
  border: 1px solid rgba(0,229,207,.3);
  border-radius: 24px;
  padding: 56px 48px;
  margin: 40px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.formula-box::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(0,229,207,.06) 0%, transparent 50%);
  animation: rotate 30s linear infinite; pointer-events: none;
}
@keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
.formula-box .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--cian); margin-bottom: 20px;
}
.formula-box .formula {
  font-family: 'Fraunces', serif; font-weight: 400;
  font-size: clamp(28px, 4vw, 44px); line-height: 1.2; letter-spacing: -.02em;
  position: relative; z-index: 1;
}
.formula-box .formula em { font-style: italic; font-weight: 500; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.formula-box .formula .var { color: var(--cian); font-weight: 600; font-style: normal; }
.formula-box .author {
  margin-top: 24px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-3);
}

/* ═══════════════════════════════════════════════════════════════════════ */
/* TABLE                                                                       */
/* ═══════════════════════════════════════════════════════════════════════ */
.table-wrap { margin: 32px 0; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--card); }
table { width: 100%; border-collapse: collapse; font-size: 15px; }
th {
  background: var(--card-2);
  color: var(--cian);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 18px 22px; text-align: left;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
}
td { padding: 18px 22px; border-bottom: 1px solid var(--line); color: var(--text-2); vertical-align: top; }
tr:last-child td { border-bottom: none; }
td strong { color: var(--text); }
td .check { color: var(--success); font-weight: 700; }
td .cross { color: var(--danger); font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════════════ */
/* QUOTE                                                                       */
/* ═══════════════════════════════════════════════════════════════════════ */
.zenith-quote {
  font-family: 'Fraunces', serif; font-weight: 400;
  font-size: clamp(22px, 3vw, 32px); line-height: 1.35; letter-spacing: -.015em;
  padding: 36px 40px;
  background: var(--card);
  border-left: 4px solid var(--cian);
  border-radius: 8px;
  margin: 28px 0;
  position: relative;
}
.zenith-quote::before {
  content: '"'; position: absolute; top: -10px; left: 24px;
  font-size: 80px; line-height: 1; color: var(--cian); opacity: .3;
}
.zenith-quote em { font-style: italic; font-weight: 500; color: var(--cian); }
.zenith-quote .author {
  display: block; margin-top: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); font-weight: 400;
}

/* ═══════════════════════════════════════════════════════════════════════ */
/* CHECKLIST                                                                   */
/* ═══════════════════════════════════════════════════════════════════════ */
.checklist {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 32px;
  margin: 24px 0;
}
.checklist h3 { color: var(--cian); margin-bottom: 18px; font-family: 'Fraunces', serif; font-weight: 500; }
.checklist ul { list-style: none; padding: 0; }
.checklist li {
  padding: 14px 0 14px 36px; position: relative; color: var(--text-2);
  border-bottom: 1px dashed var(--line); line-height: 1.55;
}
.checklist li:last-child { border-bottom: none; }
.checklist li::before {
  content: '✓'; position: absolute; left: 0; top: 12px;
  color: var(--cian); font-weight: 700; font-size: 18px;
}
.checklist li.x::before { content: '✕'; color: var(--danger); }
.checklist li b { color: var(--text); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════════ */
/* CTA STRIP                                                                   */
/* ═══════════════════════════════════════════════════════════════════════ */
.cta-strip {
  background: var(--grad);
  border-radius: 24px;
  padding: 60px 48px;
  text-align: center;
  margin: 50px 0;
  color: #000;
  position: relative;
  overflow: hidden;
}
.cta-strip h2 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: clamp(32px, 5vw, 48px); line-height: 1.1;
  color: #000; margin-bottom: 16px;
}
.cta-strip h2 em { font-style: italic; color: rgba(0,0,0,.85); }
.cta-strip p { color: rgba(0,0,0,.75); font-size: 18px; margin-bottom: 28px; }
.cta-button {
  display: inline-block;
  background: #000; color: var(--cian);
  padding: 20px 44px; border-radius: 100px;
  font-weight: 700; text-decoration: none; font-size: 17px;
  letter-spacing: .04em;
  transition: transform .2s;
  border: 2px solid #000;
}
.cta-button:hover { transform: scale(1.05); background: var(--cian); color: #000; border-color: var(--cian); }

/* ═══════════════════════════════════════════════════════════════════════ */
/* TAGS                                                                        */
/* ═══════════════════════════════════════════════════════════════════════ */
.tag-badge {
  display: inline-block;
  background: rgba(0,229,207,.12);
  color: var(--cian);
  padding: 6px 14px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid rgba(0,229,207,.3);
  margin-right: 8px; margin-bottom: 6px;
}
.tag-badge.purple { background: rgba(184,69,255,.12); color: var(--purple); border-color: rgba(184,69,255,.3); }
.tag-badge.green { background: rgba(16,224,161,.12); color: var(--success); border-color: rgba(16,224,161,.3); }
.tag-badge.red { background: rgba(255,77,109,.12); color: var(--danger); border-color: rgba(255,77,109,.3); }

/* ═══════════════════════════════════════════════════════════════════════ */
/* ZENITH FOOTER (BRANDING OBLIGATORIO en CADA HTML)                          */
/* ═══════════════════════════════════════════════════════════════════════ */
.zenith-footer {
  padding: 80px 0 50px;
  text-align: center;
  border-top: 1px solid var(--line);
  margin-top: 80px;
  position: relative;
}
.zenith-footer .footer-brand {
  display: inline-flex; align-items: center; gap: 14px;
  margin-bottom: 24px;
}
.zenith-footer .footer-brand .logo {
  width: 40px; height: 40px; display: grid; place-items: center;
  background: var(--grad); border-radius: 10px;
  box-shadow: 0 0 24px rgba(0,229,207,.4);
}
.zenith-footer .footer-brand .logo svg { width: 22px; height: 22px; }
.zenith-footer .footer-brand .name {

/* ═══════════════════════════════════════════════════════════════════════ */
/* PRINT-FRIENDLY · ESTÉTICA PRESERVADA EN PDF                                 */
/* ═══════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════ */
/* PRINT-TO-PDF + GOOGLE DRIVE · ESTÉTICA ZENITH PRESERVADA AL 100%        */
/* ═══════════════════════════════════════════════════════════════════════ */
@media print {
  /* Forzar preservación de colores en TODOS los elementos */
  *, *::before, *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* Body: mantener background dark Zenith */
  html, body {
    background: #050510 !important;
    background-color: #050510 !important;
    color: #ffffff !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Backgrounds radiales y FX preservados */
  .bg-fx, .bg-fx::before, .bg-grid, .particles {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  /* Secciones: evitar cortes feos */
  section { padding: 40px 0 !important; page-break-inside: avoid; }
  header.hero, .hero { min-height: auto !important; padding: 40px 0 !important; page-break-after: avoid; }

  /* Cards / formulas / quotes / checklists / stacks: NO cortar a mitad */
  .card, .formula-box, .checklist, .core-quote, .zenith-quote,
  .stack-section, .warranty-block, .bonus-card, .bullet-card,
  .testimonial-card, .faq-item, .ps-block, .story-block,
  .core-section, .rule-block, .variant-card, .ingredient-card,
  .ang-card, .comp-card, .ad-card, .gap-card, .diff-card,
  .dm-card, .sub-card, .yt-vid-card, .gold-card, .empathy-card,
  .desire-main, .enemy-card, .r-card, .ing-card, .test-deal,
  .recommendation, .cta-strip, .cta-final, .mechanism-section,
  .ingredients-section, .product-meta, .hero-promise-meta,
  .meta-block, .promise-meta-block, .num-pill, .num-circ,
  .stack-row, .stack-totals, .stack-totals-row,
  .testimonials-grid, .bullets-grid, .bonus-grid, .variants-grid,
  .ingredients-grid, .restate-grid, .card-grid-2, .card-grid-3, .card-grid-4 {
    page-break-inside: avoid !important;
    break-inside: avoid !important;
  }

  /* HUD sticky: deshabilitarlo en print (ocupa espacio) */
  .zenith-hud { position: static !important; padding: 16px 32px !important; }

  /* Gradientes inline (en backgrounds): forzar preservación */
  [style*="gradient"], [style*="linear-gradient"], [style*="radial-gradient"] {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* SVGs: preservar colores y gradientes */
  svg, svg * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Footer Zenith: preservar visualmente */
  .zenith-footer, footer {
    page-break-inside: avoid !important;
    background: #050510 !important;
  }
  .zenith-footer .footer-brand, footer .footer-brand,
  .zenith-footer .logo, footer .logo {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Quitar animaciones (no se aprecian en PDF y rompen) */
  *, *::before, *::after {
    animation-duration: 0s !important;
    animation-delay: 0s !important;
    transition: none !important;
  }

  /* Page setup: A4 vertical estándar, márgenes mínimos */
  @page {
    size: A4 portrait;
    margin: 8mm;
  }

  /* Tipografías: forzar Fraunces + Inter aunque Google Fonts no cargue */
  body, p, div, span, li, td, th {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif !important;
  }
  h1, h2, h3, h4, .display, .hero h1, .section-title,
  .formula-box .formula, .zenith-quote, .footer-brand .name,
  header.hero h1 {
    font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif !important;
  }
  .mono, code, pre, .label, .section-tag, .hero-tag {
    font-family: 'JetBrains Mono', 'Courier New', monospace !important;
  }
}
